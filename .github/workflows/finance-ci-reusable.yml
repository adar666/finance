# Reusable test suite (Vitest + Playwright E2E). Required check name: "Unit, integration, and E2E"
name: Finance CI reusable

on:
  workflow_call:

jobs:
  finance-ci-tests:
    name: Unit, integration, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiJ9.e30.test-anon-key

    steps:
      # v5+ runs on newer Actions Node runtime (avoids Node 20 deprecation on checkout/setup steps)
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e
