# Runs all tests on push/PR. On the default branch, deploy job runs only after tests pass.
name: Finance CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: finance-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  finance-ci-tests:
    uses: ./.github/workflows/finance-ci-reusable.yml

  deploy:
    name: Deploy (after tests)
    needs: finance-ci-tests
    if: >-
      github.event_name == 'push' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Tests passed — deploy hook
        run: |
          echo "All Finance tests passed on default branch."
          echo "Add deployment steps here (e.g. Vercel CLI) or require check 'Finance CI / Unit, integration, and E2E' in rulesets."
